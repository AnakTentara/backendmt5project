<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle v9 | Institutional Quant Engine</title>
    <meta name="description" content="Professional dashboard for Oracle v9 APEX ENGINE">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="institutional-theme">
    <div class="top-bar">
        <div class="logo-area">
            <span class="brand">THE ORACLE</span>
            <span class="version">v9.1 APEX</span>
        </div>
        <div class="system-status">
            <span id="sync-status">DISCONNECTED</span>
            <div class="status-dot" id="status-dot"></div>
            <span id="last-update" class="timestamp">--:--:--</span>
        </div>
    </div>

    <main class="dashboard-grid">
        <!-- KPI METRICS -->
        <section class="kpi-panel">
            <div class="metric-box">
                <span class="label">EQUITY</span>
                <span id="kpi-equity" class="value mono">--</span>
                <span id="kpi-floating" class="sub-value">--</span>
            </div>
            <div class="metric-box">
                <span class="label">DRAWDOWN</span>
                <span id="kpi-drawdown" class="value mono danger">--</span>
            </div>
            <div class="metric-box">
                <span class="label">PNL (30D)</span>
                <span id="kpi-total-pnl" class="value mono">--</span>
            </div>
            <div class="metric-box">
                <span class="label">WIN RATE</span>
                <span id="kpi-winrate" class="value mono highlight">--</span>
            </div>
        </section>

        <!-- MAIN CHART -->
        <section class="chart-panel content-box">
            <div class="box-header">PERFORMANCE GROWTH (CUMULATIVE USD)</div>
            <div class="chart-container">
                <canvas id="growthChart"></canvas>
            </div>
        </section>

        <!-- TRADE HISTORY TABLE -->
        <section class="history-panel content-box">
            <div class="box-header">ORDER HISTORY (MT5 SYNC)</div>
            <div class="table-wrapper">
                <table id="trade-history-table">
                    <thead>
                        <tr>
                            <th>TIME</th>
                            <th>SYMBOL</th>
                            <th>TICKET</th>
                            <th>TYPE</th>
                            <th>LOT</th>
                            <th>PRICE IN</th>
                            <th>PRICE OUT</th>
                            <th>PROFIT</th>
                            <th>PnL%</th>
                        </tr>
                    </thead>
                    <tbody id="history-body">
                        <!-- Rows injected by JS -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- AI LESSONS -->
        <section class="lessons-panel">
            <div class="content-box side-box">
                <div class="box-header">AI VICTORIES</div>
                <div id="victories-list" class="scroll-list"></div>
            </div>
            <div class="content-box side-box">
                <div class="box-header">AI DISASTERS</div>
                <div id="disasters-list" class="scroll-list"></div>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
